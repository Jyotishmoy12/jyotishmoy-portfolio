site_name: Jyotishmoy Deka - Full Stack Engineer
site_url: ""
site_author: Jyotishmoy Deka
site_description: "Portfolio of Jyotishmoy Deka, a Full Stack Engineer."

theme:
  name: material
  favicon: material/robot-outline
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to Dracula Mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to Light Mode
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Experience: experience.md
  - Projects:
      - Projects Overview: projects.md
      - Javascript Projects:

          - Overview: javascript-projects.md
          - LeetCode Backend System: leetcode-backend.md
          - Airbnb Booking System: airbnb-clone.md
          - Airline Booking System: airline-booking.md
      - Go Projects:
          - Overview: go-projects.md
          - Go-Torrent: go-torrent.md
          - Go-LSM: go-lsm.md
          - Go-SMTP Server: go-smtp.md
          - Go-DNS Server: go-dns.md
          - Go-Browser Engine: go-browser.md
      - C++ Projects:
          - Overview: cpp-projects.md
          - VCC - Version Control: vcc.md
  - Blogs:
      - Overview: blogs.md
      - HTTP Message Structure: http-structure.md
      - CDN Deep-Dive: cdn-deep-dive.md
      - Cookies Deep-Dive: cookies-deep-dive.md
      - OAuth 2.0 Deep-Dive: oauth-deep-dive.md
      - Inside the .torrent File: torrent-file-structure.md
      - Building a Recursive Descent HTML Parser in Go: go-browser-html-parser.md
  - Research:
      - Overview: research.md
      - Constrained LCS & LCStr: constrained-lcs-paper.md
      - LCS & LCStr Algorithm: lcs-paper.md
  - Skills & Education: skills.md
copyright: |
  &copy; 2026 Jyotishmoy Deka. 
  <br>
  <img src="https://hits.dwyl.com/Jyotishmoy12/jyotishmoy-portfolio.svg?style=flat-square&show=unique&color=bd93f9" alt="Unique Visitors">

extra_javascript:
  - javascripts/terminal.js
  - javascripts/spotlight.js
  - javascripts/flow-visualizer.js

extra_css:
  - stylesheets/extra.css
